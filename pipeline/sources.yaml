    transformer: fibre
    notes: >
      Peu prédictif une fois le type de territoire contrôlé (urbain/rural).
      À conserver uniquement pour une analyse spécifique fracture numérique × abstention.

  # ---------------------
  # CONTOURS GÉOGRAPHIQUES
  # ---------------------
  # Source : data.gouv.fr « Contours administratifs » (Admin Express simplifié)
  # GeoJSON des contours à plusieurs résolutions.
  # Communes : 50m pour zoom, 1000m pour vue France entière.
  # Départements et régions : 50m (léger, suffisant).
  # Le transformer extrait code, nom et geometry (GeoJSON string) + centroïde.

  - id: geo_communes_50m
    name: "Contours communes 2025 — 50m"
    category: territoire
    producer: data.gouv.fr / IGN
    year: 2025
    tier: 2
    download:
      type: geojson
      url: "https://object.data.gouv.fr/contours-administratifs/2025/geojson/communes-50m.geojson.gz"
      format: geojson.gz
      filename: geo_communes_50m.geojson.gz
    target_table: geo_communes
    transformer: geo_contours
    notes: >
      Résolution 50m : bon compromis poids/précision pour la carte zoomée.
      ~35 000 features, environ 80 Mo décompressé.

  - id: geo_communes_1000m
    name: "Contours communes 2025 — 1000m"
    category: territoire
    producer: data.gouv.fr / IGN
    year: 2025
    tier: 2
    download:
      type: geojson
      url: "https://object.data.gouv.fr/contours-administratifs/2025/geojson/communes-1000m.geojson.gz"
      format: geojson.gz
      filename: geo_communes_1000m.geojson.gz
    target_table: geo_communes_lowres
    transformer: geo_contours
    notes: >
      Résolution 1000m : très léger (~5 Mo), idéal pour la vue France entière
      dans le navigateur via DuckDB-WASM.

  - id: geo_departements
    name: "Contours départements 2025 — 50m"
    category: territoire
    producer: data.gouv.fr / IGN
    year: 2025
    tier: 2
    download:
      type: geojson
      url: "https://object.data.gouv.fr/contours-administratifs/2025/geojson/departements-50m.geojson.gz"
      format: geojson.gz
      filename: geo_departements.geojson.gz
    target_table: geo_departements
    transformer: geo_contours
    notes: >
      101 départements. Utilisé comme overlay de référence sur la carte.

  - id: geo_regions
    name: "Contours régions 2025 — 50m"
    category: territoire
    producer: data.gouv.fr / IGN
    year: 2025
    tier: 2
    download:
      type: geojson
      url: "https://object.data.gouv.fr/contours-administratifs/2025/geojson/regions-50m.geojson.gz"
      format: geojson.gz
      filename: geo_regions.geojson.gz
    target_table: geo_regions
    transformer: geo_contours
    notes: >
      18 régions. Overlay léger pour la carte.

  # ---------------------
  # MAIRES SORTANTS
  # ---------------------
  # Rétrogradé en optionnel : analytiquement intéressant (effet notoriété)
  # mais difficile à fiabiliser sur 35 000 communes. Les données existent
  # (muni_2026_maires_sortants ci-dessus) mais l'exploitation est complexe.
