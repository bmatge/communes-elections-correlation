# =============================================================================
# VoteSocio — Registry des sources de données
# =============================================================================
# Chaque bloc décrit une source : téléchargement, colonnes, variables à extraire.
# Ajouter une source = ajouter un bloc ici. Pas de code sauf transformer custom.
# =============================================================================

# -----------------------------------------------------------------------------
# Mapping des familles politiques (utilisé par le transformer élections)
# -----------------------------------------------------------------------------
familles_politiques:
  # Municipales (nuances L*)
  # Législatives 2024 (nuances courtes)
  # Législatives 2022 (nuances courtes, système différent)
  # Européennes 2024 (nuances L*)
  # Régionales 2021 (nuances L*)
  # Départementales 2021 (nuances BC-*)
  gauche:
    - LFI
    - LDVG
    - LVEC
    - LSOC
    - LUG
    - LEXG
    - LCOM
    - LRDG
    - LUGE        # Régionales — Union Gauche Écolo
    - LUCG        # Régionales — Union Centre-Gauche
    # Législatives 2024
    - EXG
    - UG
    - FI
    - SOC
    - VEC
    - RDG
    - COM
    - DVG
    # Législatives 2022
    - DXG
    - NUP
    - ECO
    # Départementales 2021
    - BC-DVG
    - BC-UGE
    - BC-UG
    - BC-ECO
    - BC-COM
    - BC-SOC
    - BC-FI
    - BC-EXG
    - BC-RDG
    - BC-UCG
  centre:
    - LREM
    - LCNTRE
    - LMDM
    - LHORI
    - LDVC
    - LENS        # Européennes — Ensemble
    - LUC         # Régionales — Union Centre
    - LUCD        # Régionales — Union Centre-Droite
    # Législatives 2024
    - ENS
    - DVC
    - HOR
    - UDI
    # Législatives 2022
    # ENS already listed
    # Départementales 2021
    - BC-REM
    - BC-DVC
    - BC-UDI
    - BC-MDM
    - BC-UC
  droite:
    - LREP
    - LDVD
    - LLR
    - LUD
    # Législatives 2024
    - LR
    - DVD
    - REG
    # Législatives 2022
    # LR already listed
    # Départementales 2021
    - BC-DVD
    - BC-LR
    - BC-UD
  extreme_droite:
    - LRN
    - LREC
    - LEXD
    - LUDI        # Régionales — Union Droite (inclut ED dans ce contexte)
    # Législatives 2024
    - RN
    - REC
    - EXD
    - UXD
    # Législatives 2022
    - DXD
    # Départementales 2021
    - BC-RN
    - BC-EXD
    - BC-UXD
  sans_etiquette:
    - LSE
    - LDIV
    - LDSV        # Régionales — Divers / Souverainiste
    - LREG        # Régionales — Régionaliste
    # Législatives 2024
    - DIV
    - DSV
    - REG
    # Législatives 2022
    - DSV
    # Départementales 2021
    - BC-DIV
    - BC-DSV
    - BC-REG
    - BC-GJ

# =============================================================================
# COUCHE 1 — NOYAU
# =============================================================================

# ---------------------
# ÉLECTIONS
# ---------------------

sources:

  # --- Élections agrégées (toutes élections, format unifié) ---
  # Ce dataset contient TOUTES les élections. On l'utilise pour :
  # - Municipales 2026 T1/T2 et 2020 T1/T2 (cible + comparaison)
  # - Présidentielles 2022 T1 et 2017 T1 (référence nationale)
  # - Législatives 2024 T1 et 2022 T1 (dissolution + cycle normal)
  # - Européennes 2024 T1 (marqueur idéologique)
  # - Régionales 2021 T1 (échelon intermédiaire)
  # - Départementales 2021 T1 (échelon local binômes)
  - id: elections_agregees_general
    name: "Élections agrégées — résultats généraux"
    category: electoral
    producer: data.gouv.fr
    year: 2026
    download:
      type: direct_url
      url: "https://object.files.data.gouv.fr/data-pipeline-open/elections/general_results.parquet"
      format: parquet
    join_key: code_commune
    filter:
      id_election:
        - "2026_muni_t1"
        - "2026_muni_t2"
        - "2020_muni_t1"
        - "2020_muni_t2"
        - "2022_pres_t1"
        - "2017_pres_t1"
        - "2024_legi_t1"
        - "2022_legi_t1"
        - "2024_euro_t1"
        - "2021_regi_t1"
        - "2021_dpmt_t1"
    notes: >
      Contient inscrits, abstentions, votants, exprimés par bureau de vote.
      À agréger par code_commune. Le filtre multi-élections permet de construire
      des trajectoires électorales et de comparer local vs national.
    transformer: elections

  - id: elections_agregees_candidats
    name: "Élections agrégées — résultats par candidat/liste"
    category: electoral
    producer: data.gouv.fr
    year: 2026
    download:
      type: direct_url
      url: "https://object.files.data.gouv.fr/data-pipeline-open/elections/candidats_results.parquet"
      format: parquet
    join_key: code_commune
    filter:
      id_election:
        - "2026_muni_t1"
        - "2026_muni_t2"
        - "2020_muni_t1"
        - "2020_muni_t2"
        - "2022_pres_t1"
        - "2017_pres_t1"
        - "2024_legi_t1"
        - "2022_legi_t1"
        - "2024_euro_t1"
        - "2021_regi_t1"
        - "2021_dpmt_t1"
    notes: >
      Contient voix, nuance politique, % par liste et bureau de vote.
      À agréger par code_commune + nuance → familles politiques.
      Couvre ~35K communes pour tous les scrutins nationaux.
    transformer: elections

  - id: nuances_politiques
    name: "Dictionnaire des nuances politiques (circulaire fév. 2026)"
    category: electoral
    producer: data.gouv.fr
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/donnees-des-elections-agregees/20260324-132009/nuances.csv"
      format: csv
    notes: Table de référence, pas de jointure directe.

  # --- Résultats officiels municipales 2026 (Ministère Intérieur) ---
  - id: muni_2026_t1_communes
    name: "Municipales 2026 T1 — résultats par commune"
    category: electoral
    producer: Ministère de l'Intérieur
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/elections-municipales-2026-resultats-du-premier-tour/20260320-164339/municipales-2026-resultats-communes-2026-03-20.csv"
      format: csv
    join_key: code_commune

  - id: muni_2026_t1_candidats
    name: "Municipales 2026 T1 — candidats élus"
    category: electoral
    producer: Ministère de l'Intérieur
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/elections-municipales-2026-resultats-du-premier-tour/20260320-164100/municipales-2026-candidats-elus-france-entiere-tour-1-2026-03-20.csv"
      format: csv
    join_key: code_commune

  - id: muni_2026_t2_communes
    name: "Municipales 2026 T2 — résultats par commune"
    category: electoral
    producer: Ministère de l'Intérieur
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/elections-municipales-2026-resultats-du-scond-tour/20260323-180124/municipales-2026-resultats-communes-2026-03-23-16h14.csv"
      format: csv
    join_key: code_commune

  - id: muni_2026_t2_candidats
    name: "Municipales 2026 T2 — candidats élus"
    category: electoral
    producer: Ministère de l'Intérieur
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/elections-municipales-2026-resultats-du-scond-tour/20260323-180122/municipales-2026-candidats-elus-france-entiere-tour-2-2026-03-23.csv"
      format: csv
    join_key: code_commune

  - id: muni_2026_listes_t1
    name: "Municipales 2026 — listes candidates T1"
    category: electoral
    producer: Ministère de l'Intérieur
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/elections-municipales-2026-listes-candidates-au-premier-tour/20260313-152615/municipales-2026-candidatures-france-entiere-tour-1-2026-03-13.csv"
      format: csv
    join_key: code_commune

  - id: muni_2026_maires_sortants
    name: "Municipales 2026 — maires sortants"
    category: electoral
    producer: Ministère de l'Intérieur
    year: 2026
    download:
      type: direct_url
      url: "https://static.data.gouv.fr/resources/elections-municipales-2026-maires-et-conseillers-municipaux-sortants/20260302-101708/mun2026-maires-sortants-20260227.csv"
      format: csv
    join_key: code_commune

  # Présidentielle 2022 T1 : intégrée dans elections_agregees (filter 2022_pres_t1)
  # Plus besoin du XLSX officiel, le Parquet agrégé est plus simple à exploiter.

  # ---------------------
  # REVENUS & INÉGALITÉS
  # ---------------------

  - id: filosofi_2021
    name: "Revenus et pauvreté — FILOSOFI 2021"
    category: revenus
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/7756729"
      filename: "filosofi_2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: filosofi
    variables:
      - id: revenu_median
        source_col: MED21
        name: "Revenu médian par UC"
        type: numeric
        unit: "€"

      - id: taux_pauvrete
        source_col: TP6021
        name: "Taux de pauvreté (seuil 60%)"
        type: numeric
        unit: "%"

      - id: ratio_interdecile
        source_col: GI21
        name: "Ratio interdécile D9/D1"
        type: numeric
        unit: ""

      - id: d1
        source_col: D121
        name: "1er décile de revenu"
        type: numeric
        unit: "€"

      - id: d9
        source_col: D921
        name: "9e décile de revenu"
        type: numeric
        unit: "€"

  # ---------------------
  # RECENSEMENT — LOGEMENT
  # ---------------------

  - id: rp_logement_2021
    name: "RP 2021 — Logement"
    category: logement
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/7632558"
      filename: "rp_logement_2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: rp_logement
    # TODO: retélécharger base IC pour HLM, rés.sec, vacants
    variables:
      - id: rp_total
        source_col: P21_RP
        name: "Résidences principales — total"
        type: numeric
        unit: ""

      - id: rp_prop
        source_col: P21_RP_PROP
        name: "Résidences principales — propriétaires"
        type: numeric
        unit: ""

      - id: rp_loc
        source_col: P21_RP_LOC
        name: "Résidences principales — locataires"
        type: numeric
        unit: ""

    computed:
      - id: pct_proprietaires
        formula: "rp_prop / rp_total * 100"
        name: "Part des propriétaires"
        type: numeric
        unit: "%"
        category: logement

  # ---------------------
  # RECENSEMENT — ACTIVITÉ & EMPLOI
  # ---------------------

  - id: rp_activite_2021
    name: "RP 2021 — Activité et emploi"
    category: emploi
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/7632646"
      filename: "rp_activite_2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: rp_activite
    # TODO: retélécharger base IC activité pour CS1-CS6
    variables:
      - id: chomeurs_15_64
        source_col: P21_CHOM1564
        name: "Chômeurs 15-64 ans"
        type: numeric
        unit: ""

      - id: actifs_15_64
        source_col: P21_ACT1564
        name: "Actifs 15-64 ans"
        type: numeric
        unit: ""

    computed:
      - id: taux_chomage
        formula: "chomeurs_15_64 / actifs_15_64 * 100"
        name: "Taux de chômage"
        type: numeric
        unit: "%"
        category: emploi

  # ---------------------
  # RECENSEMENT — DIPLÔMES
  # ---------------------

  - id: rp_diplomes_2021
    name: "RP 2021 — Diplômes et formation"
    category: education
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/7632715"
      filename: "rp_diplomes_2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: rp_diplomes
    variables:
      - id: pop_15plus_scol
        source_col: P21_NSCOL15P
        name: "Population 15+ non scolarisée"
        type: numeric
        unit: ""

      - id: sans_diplome
        source_col: P21_NSCOL15P_NODIP
        name: "Sans diplôme (15+)"
        type: numeric
        unit: ""

      - id: diplome_capbep
        source_col: P21_NSCOL15P_CAPBEP
        name: "CAP-BEP"
        type: numeric
        unit: ""

      - id: diplome_bac
        source_col: P21_NSCOL15P_BAC
        name: "Baccalauréat"
        type: numeric
        unit: ""

      - id: diplome_sup2
        source_col: P21_NSCOL15P_SUP2
        name: "Bac+2"
        type: numeric
        unit: ""

      - id: diplome_sup34
        source_col: P21_NSCOL15P_SUP34
        name: "Bac+3/4"
        type: numeric
        unit: ""

      - id: diplome_sup5
        source_col: P21_NSCOL15P_SUP5
        name: "Bac+5 et plus"
        type: numeric
        unit: ""

    computed:
      - id: pct_diplomes_sup
        formula: "(diplome_sup2 + diplome_sup34 + diplome_sup5) / pop_15plus_scol * 100"
        name: "Part des diplômés du supérieur"
        type: numeric
        unit: "%"
        category: education

      - id: pct_sans_diplome
        formula: "sans_diplome / pop_15plus_scol * 100"
        name: "Part des sans diplôme"
        type: numeric
        unit: "%"
        category: education

  # ---------------------
  # RECENSEMENT — POPULATION
  # ---------------------

  - id: rp_population_2022
    name: "RP 2022 — Évolution et structure de la population"
    category: territoire
    producer: INSEE
    year: 2022
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/7631458"
      filename: "rp_population_2022.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: rp_population
    # TODO: superficie à calculer depuis contours GeoJSON
    variables:
      - id: population
        source_col: P22_POP
        name: "Population totale"
        type: numeric
        unit: "hab."

      - id: pop_0014
        source_col: P22_POP0014
        name: "Population 0-14 ans"
        type: numeric
        unit: ""

      - id: pop_6074
        source_col: P22_POP6074
        name: "Population 60-74 ans"
        type: numeric
        unit: ""

      - id: pop_75plus
        source_col: P22_POP75P
        name: "Population 75 ans et plus"
        type: numeric
        unit: ""

      - id: pop_etrangere
        source_col: P22_POP_ETR
        name: "Population étrangère"
        type: numeric
        unit: ""

    computed:
      - id: pct_60plus
        formula: "(pop_6074 + pop_75plus) / population * 100"
        name: "Part des 60 ans et plus"
        type: numeric
        unit: "%"
        category: territoire

      - id: pct_etrangers
        formula: "pop_etrangere / population * 100"
        name: "Part de la population étrangère"
        type: numeric
        unit: "%"
        category: territoire

      - id: pct_jeunes
        formula: "pop_0014 / population * 100"
        name: "Part des moins de 15 ans"
        type: numeric
        unit: "%"
        category: territoire

  # ---------------------
  # BASES IC (Indicateurs Communaux) — IRIS agrégés
  # Fichiers téléchargés manuellement depuis insee.fr/statistiques/8268*
  # Contiennent les variables absentes des tableaux détaillés (CSP, HLM, etc.)
  # ---------------------

  - id: ic_population_2021
    name: "Base IC 2021 — Population (IRIS agrégé)"
    category: territoire
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/8268806"
      filename: "base-ic-population-2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: ic_population
    variables:
      - id: ic_pop_15plus
        source_col: C21_POP15P
        name: "Population 15 ans et plus"
        type: numeric
        unit: ""

      - id: cs_agriculteurs
        source_col: C21_POP15P_CS1
        name: "Agriculteurs exploitants"
        type: numeric
        unit: ""

      - id: cs_artisans
        source_col: C21_POP15P_CS2
        name: "Artisans, commerçants, chefs d'entreprise"
        type: numeric
        unit: ""

      - id: cs_cadres
        source_col: C21_POP15P_CS3
        name: "Cadres et professions intellectuelles supérieures"
        type: numeric
        unit: ""

      - id: cs_prof_inter
        source_col: C21_POP15P_CS4
        name: "Professions intermédiaires"
        type: numeric
        unit: ""

      - id: cs_employes
        source_col: C21_POP15P_CS5
        name: "Employés"
        type: numeric
        unit: ""

      - id: cs_ouvriers
        source_col: C21_POP15P_CS6
        name: "Ouvriers"
        type: numeric
        unit: ""

      - id: cs_retraites
        source_col: C21_POP15P_CS7
        name: "Retraités"
        type: numeric
        unit: ""

      - id: cs_autres_inactifs
        source_col: C21_POP15P_CS8
        name: "Autres personnes sans activité professionnelle"
        type: numeric
        unit: ""

      - id: pop_immigree
        source_col: P21_POP_IMM
        name: "Population immigrée"
        type: numeric
        unit: ""

    computed:
      - id: pct_cadres
        formula: "cs_cadres / ic_pop_15plus * 100"
        name: "Part des cadres"
        type: numeric
        unit: "%"
        category: emploi

      - id: pct_ouvriers
        formula: "cs_ouvriers / ic_pop_15plus * 100"
        name: "Part des ouvriers"
        type: numeric
        unit: "%"
        category: emploi

      - id: pct_agriculteurs
        formula: "cs_agriculteurs / ic_pop_15plus * 100"
        name: "Part des agriculteurs"
        type: numeric
        unit: "%"
        category: emploi

      - id: pct_employes
        formula: "cs_employes / ic_pop_15plus * 100"
        name: "Part des employés"
        type: numeric
        unit: "%"
        category: emploi

      - id: pct_retraites
        formula: "cs_retraites / ic_pop_15plus * 100"
        name: "Part des retraités"
        type: numeric
        unit: "%"
        category: territoire

      - id: pct_immigres
        formula: "pop_immigree / ic_pop_15plus * 100"
        name: "Part de la population immigrée"
        type: numeric
        unit: "%"
        category: territoire

  - id: ic_logement_2021
    name: "Base IC 2021 — Logement (IRIS agrégé)"
    category: logement
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/8268838"
      filename: "base-ic-logement-2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: ic_logement
    variables:
      - id: rp_hlm
        source_col: P21_RP_LOCHLMV
        name: "Résidences principales — HLM"
        type: numeric
        unit: ""

      - id: res_secondaires
        source_col: P21_RSECOCC
        name: "Résidences secondaires et logements occasionnels"
        type: numeric
        unit: ""

      - id: logements_vacants
        source_col: P21_LOGVAC
        name: "Logements vacants"
        type: numeric
        unit: ""

      - id: ic_logements_total
        source_col: P21_LOG
        name: "Logements totaux"
        type: numeric
        unit: ""

      - id: ic_rp_total
        source_col: P21_RP
        name: "Résidences principales (IC)"
        type: numeric
        unit: ""

    computed:
      - id: pct_hlm
        formula: "rp_hlm / ic_rp_total * 100"
        name: "Part des HLM"
        type: numeric
        unit: "%"
        category: logement

      - id: pct_res_secondaires
        formula: "res_secondaires / ic_logements_total * 100"
        name: "Part des résidences secondaires"
        type: numeric
        unit: "%"
        category: logement

      - id: pct_logements_vacants
        formula: "logements_vacants / ic_logements_total * 100"
        name: "Part des logements vacants"
        type: numeric
        unit: "%"
        category: logement

  - id: ic_activite_2021
    name: "Base IC 2021 — Activité des résidents (IRIS agrégé)"
    category: emploi
    producer: INSEE
    year: 2021
    download:
      type: insee_zip
      url: "https://www.insee.fr/fr/statistiques/8268843"
      filename: "base-ic-activite-2021.csv"
      encoding: utf-8
      separator: ";"
    join_key: CODGEO
    transformer: ic_activite
    variables:
      - id: ic_pop_1564
        source_col: P21_POP1564
        name: "Population 15-64 ans"
        type: numeric
        unit: ""

      - id: ic_act_1564
        source_col: P21_ACT1564
        name: "Actifs 15-64 ans (IC)"
        type: numeric
        unit: ""

      - id: ic_actocc_1564
        source_col: P21_ACTOCC1564
        name: "Actifs occupés 15-64 ans"
        type: numeric
        unit: ""

      - id: ic_chom_1564
        source_col: P21_CHOM1564
        name: "Chômeurs 15-64 ans (IC)"
        type: numeric
        unit: ""

      - id: ic_actocc_tp
        source_col: P21_ACTOCC15P_TP
        name: "Actifs occupés à temps partiel"
        type: numeric
        unit: ""

    computed:
      - id: taux_activite
        formula: "ic_act_1564 / ic_pop_1564 * 100"
        name: "Taux d'activité 15-64 ans"
        type: numeric
        unit: "%"
        category: emploi

  # ---------------------
  # CARTE DES LOYERS
  # ---------------------

  - id: loyers_2025
    name: "Carte des loyers — appartements 2025"
    category: logement
    producer: Ministère du Logement
    year: 2025
    download:
      type: direct_url
