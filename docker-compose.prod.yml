# =============================================================================
# VoteSocio — Docker Compose Production
# =============================================================================
# Déploiement derrière Traefik sur ecosystem-network
# FQDN : macommune.matge.com
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml --profile tools run export
# =============================================================================

services:
  # --- Front-end (nginx + SvelteKit static) ---
  web:
    image: ghcr.io/bmatge/votesocio-web:${TAG:-latest}
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - ecosystem-network
    labels:
      - "traefik.enable=true"
      # --- Router HTTPS ---
      - "traefik.http.routers.votesocio.rule=Host(`macommune.matge.com`)"
      - "traefik.http.routers.votesocio.entrypoints=websecure"
      - "traefik.http.routers.votesocio.tls=true"
      - "traefik.http.routers.votesocio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.votesocio.tls.options=anssi-strict@file"
      # --- Service ---
      - "traefik.http.services.votesocio.loadbalancer.server.port=80"
      # --- CSP adaptée pour DuckDB-WASM + Google Fonts ---
      - "traefik.http.routers.votesocio.middlewares=votesocio-csp"
      - "traefik.http.middlewares.votesocio-csp.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://analytics.ecosysteme.matge.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; worker-src 'self' blob:; connect-src 'self' blob: https://analytics.ecosysteme.matge.com; img-src 'self' data: blob:"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # --- Pipeline de données ---
  pipeline:
    image: ghcr.io/bmatge/votesocio-pipeline:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - pipeline-data:/app/data
      - db-data:/app/db
    networks:
      - ecosystem-network
    profiles:
      - tools

  # --- Export Parquet (DuckDB → fichiers pour le front) ---
  export:
    image: ghcr.io/bmatge/votesocio-pipeline:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    command: python -m pipeline.export_parquet
    volumes:
      - db-data:/app/db:ro
      - ./web/static/data:/app/web/static/data
    networks:
      - ecosystem-network
    profiles:
      - tools

volumes:
  pipeline-data:
    driver: local
  db-data:
    driver: local

networks:
  ecosystem-network:
    external: true
