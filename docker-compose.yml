# =============================================================================
# VoteSocio — Docker Compose
# =============================================================================
# Usage:
#   docker compose up web          → front-end de production (port 8080)
#   docker compose up pipeline     → exécuter le pipeline de données
#   docker compose up export       → exporter DuckDB → Parquet pour le front
# =============================================================================

services:
  # --- Front-end (nginx + SvelteKit static) ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      # Monter les Parquet exportés dans le dossier servi par nginx
      - ./web/static/data:/usr/share/nginx/html/data:ro
    restart: unless-stopped

  # --- Pipeline de données ---
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
      - ./db:/app/db
    profiles:
      - tools

  # --- Export Parquet (DuckDB → fichiers pour le front) ---
  export:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    command: python -m pipeline.export_parquet
    volumes:
      - ./db:/app/db:ro
      - ./web/static/data:/app/web/static/data
    profiles:
      - tools
    depends_on:
      pipeline:
        condition: service_completed_successfully
        required: false
