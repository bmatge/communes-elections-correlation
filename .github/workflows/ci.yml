# =============================================================================
# VoteSocio — CI/CD
# =============================================================================
# - Tests Python (pipeline) + lint
# - Build front-end SvelteKit
# - Build + push images Docker → GHCR
# - Déploiement automatique sur push main
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # --- Tests Python ---
  test-pipeline:
    name: Tests pipeline Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check pipeline/ tests/
          ruff format --check pipeline/ tests/

      - name: Tests
        run: python -m pytest tests/ -v

  # --- Build front-end ---
  build-web:
    name: Build front-end SvelteKit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Installer les dépendances
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npm run check

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build/
          retention-days: 7

  # --- Build + Push Docker images ---
  docker:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [test-pipeline, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata — web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/votesocio-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Metadata — pipeline
        id: meta-pipeline
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/votesocio-pipeline
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build & push — pipeline
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pipeline
          push: true
          tags: ${{ steps.meta-pipeline.outputs.tags }}
          labels: ${{ steps.meta-pipeline.outputs.labels }}
          cache-from: type=gha,scope=pipeline
          cache-to: type=gha,mode=max,scope=pipeline

  # --- Déploiement automatique ---
  deploy:
    name: Déployer en production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://macommune.matge.com
    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/votesocio' }}
            docker compose -f docker-compose.prod.yml -p votesocio pull web
            docker compose -f docker-compose.prod.yml -p votesocio up -d web
            echo "Déploiement terminé — https://macommune.matge.com"
